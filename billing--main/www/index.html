<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="VegiBill TN - Professional vegetable wholesale billing software for Tamil Nadu markets" />
  <title>VegiBill TN — Professional Billing</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ═══════════════════ APP SHELL ═══════════════════ -->
<div id="app">

  <!-- TOP HEADER -->
  <header id="app-header">
    <button id="back-btn" class="header-icon-btn hidden" onclick="goBack()">&#8592;</button>
    <div id="header-title">
      <span class="header-logo">🥬</span>
      <div>
        <div class="header-name">VegiBill TN</div>
        <div class="header-sub" id="header-date"></div>
      </div>
    </div>
    <div id="header-actions"></div>
  </header>

  <!-- PAGE CONTAINER -->
  <main id="page-container"></main>

  <!-- BOTTOM NAVIGATION -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="home" onclick="navigateTo('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" data-tab="sales" onclick="navigateTo('sales')">
      <span class="nav-icon">🧾</span>
      <span class="nav-label">Sales</span>
    </button>
    <button class="nav-btn" data-tab="purchase" onclick="navigateTo('purchase')">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Purchase</span>
    </button>
    <button class="nav-btn" data-tab="parties" onclick="navigateTo('parties')">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Parties</span>
    </button>
    <button class="nav-btn" data-tab="report" onclick="navigateTo('report')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Report</span>
    </button>
  </nav>

</div>

<!-- ═══════════════════ MODAL OVERLAY ═══════════════════ -->
<div id="modal-overlay" class="hidden" onclick="closeModal()"></div>
<div id="modal-box" class="hidden"></div>

<!-- ═══════════════════ TOAST ═══════════════════ -->
<div id="toast" class="hidden"></div>

<!-- ═══════════════════ SCRIPTS ═══════════════════ -->
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/print.js"></script>
<script src="js/pages/login.js"></script>
<script src="js/pages/home.js"></script>
<script src="js/pages/add-sale.js"></script>
<script src="js/pages/sales.js"></script>
<script src="js/pages/add-purchase.js"></script>
<script src="js/pages/purchase.js"></script>
<script src="js/pages/parties.js"></script>
<script src="js/pages/items.js"></script>
<script src="js/pages/report.js"></script>
<script src="js/pages/admin.js"></script>
<script src="js/app.js"></script>

</body>
</html>
